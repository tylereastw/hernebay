<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LONG EATON SKIPS | Affordable Skip Hire - NO VAT</title>
    <meta name="description" content="Professional, reliable skip hire in Long Eaton. NO VAT on all domestic skips." />

    <!-- Canonical URL set per page by React; default here -->
    <link rel="canonical" href="https://longeatonskips.co.uk/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Long Eaton Skips" />
    <meta property="og:title" content="Long Eaton Skips | Affordable Skip Hire - NO VAT" />
    <meta property="og:description" content="Family-run skip hire in Long Eaton. No VAT, save 20%. 5, 8 & 12 yard skips from £326 inc. delivery." />
    <meta property="og:url" content="https://longeatonskips.co.uk/" />
    <meta property="og:image" content="https://longeatonskips.co.uk/favicon.svg" />
    <meta name="twitter:card" content="summary" />

    <!-- LocalBusiness JSON-LD for EEAT & knowledge graph -->

      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "@id": "https://longeatonskips.co.uk/#business",
        "name": "Long Eaton Skips",
        "alternateName": "No VAT Skips",
        "description": "Family-run skip hire service in Long Eaton, Nottinghamshire. No VAT on domestic hires. Grab hire, wait & load, commercial skip hire and rubbish clearance available.",
        "url": "https://longeatonskips.co.uk/",
        "telephone": "+447782222906",
        "email": "info@longeatonskips.co.uk",
        "priceRange": "££",
        "currenciesAccepted": "GBP",
        "paymentAccepted": "Cash, Credit Card, Debit Card",
        "foundingDate": "2015",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Long Eaton",
          "addressRegion": "Nottinghamshire",
          "postalCode": "NG10",
          "addressCountry": "GB"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 52.8977,
          "longitude": -1.2719
        },
        "areaServed": [
          { "@type": "City", "name": "Long Eaton" },
          { "@type": "City", "name": "Nottingham" },
          { "@type": "City", "name": "Derby" },
          { "@type": "City", "name": "Sandiacre" },
          { "@type": "City", "name": "Breaston" },
          { "@type": "City", "name": "Sawley" }
        ],
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
            "opens": "07:30",
            "closes": "17:30"
          }
        ],
        "sameAs": []
      }
    </script>

    <!-- Microsoft Clarity -->

      (function(c,l,a,r,i,t,y){

    <!-- Preconnect to font hosts for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- Preload Material Symbols Outlined CSS (critical for icons) -->

      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    />

    <!-- Font stylesheets with display=swap so text shows immediately -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
